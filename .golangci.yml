version: "2"

run:
  timeout: 5m
  go: "1.25"
  tests: true

formatters:
  enable:
    - gofmt
    - goimports
    - gofumpt
  settings:
    goimports:
      local-prefixes:
        - github.com/wiregoblin/wiregoblin

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - gocritic
    - nakedret
    - gosec
    - prealloc
    - lll
    - unused
  settings:
    gocritic:
      disabled-checks:
        - commentFormatting
    nakedret:
      max-func-lines: 20
    lll:
      line-length: 120
    unused:
      exported-fields-are-used: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
